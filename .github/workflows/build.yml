name: Build Executables

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libcairo2-dev

    - name: Install System Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install pkg-config cairo

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -e .
      # Assuming your project has a setup.py or pyproject.toml
      # If you use requirements.txt instead, you can uncomment the line below:
      # pip install -r requirements.txt

    - name: Inject Production URL
      shell: bash
      run: |
        python -c "import os; f = 'forensixd/constants.py'; content = open(f).read().replace('INJECTED_STREAM_URL', os.environ.get('PROD_SERVER_URL', '')).replace('INJECTED_LOGIN_URL', os.environ.get('PROD_FRONTEND_URL', '')); open(f, 'w').write(content)"
      env:
        PROD_SERVER_URL: ${{ secrets.PROD_SERVER_URL }}
        PROD_FRONTEND_URL: ${{ secrets['PROD_FRONTEND_URL'] }}

    - name: Download Android Platform Tools
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          curl -L "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -o platform-tools.zip
          unzip platform-tools.zip
        elif [ "$RUNNER_OS" == "macOS" ]; then
          curl -L "https://dl.google.com/android/repository/platform-tools-latest-darwin.zip" -o platform-tools.zip
          unzip platform-tools.zip
        else
          curl -L "https://dl.google.com/android/repository/platform-tools-latest-linux.zip" -o platform-tools.zip
          unzip platform-tools.zip
        fi

    - name: Build with PyInstaller
      shell: bash
      run: pyinstaller forensixd.spec --noconfirm

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: forensixd-${{ matrix.os }}
        path: |
          dist/forensixd*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: forensixd-*
          merge-multiple: true

      - name: List artifacts
        run: ls -R release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
