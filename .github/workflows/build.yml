name: Build Executables

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libcairo2-dev

    - name: Install System Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install pkg-config cairo

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -e .
      # Assuming your project has a setup.py or pyproject.toml
      # If you use requirements.txt instead, you can uncomment the line below:
      # pip install -r requirements.txt

    - name: Inject Production URL
      shell: bash
      run: |
        python -c "import os; f = 'forensixd/constants.py'; content = open(f).read(); open(f, 'w').write(content.replace('INJECTED_STREAM_URL', os.environ.get('PROD_SERVER_URL', '')))"
      env:
        PROD_SERVER_URL: ${{ secrets['PROD_SERVER_URL'] }}

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller forensixd/cli.py \
          --onefile \
          --name forensixd \
          --hidden-import pymobiledevice3 \
          --hidden-import Registry \
          --hidden-import pycparser.yacctab \
          --hidden-import pycparser.lextab \
          --collect-all Crypto \
          --collect-all jinja2 \
          --collect-all xhtml2pdf \
          --collect-all libusb_package \
          --noconfirm

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: forensixd-${{ matrix.os }}
        path: |
          dist/forensixd*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: forensixd-*
          merge-multiple: true

      - name: List artifacts
        run: ls -R release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
