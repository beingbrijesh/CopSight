name: Deploy AI Service to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'ai-service/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: ${{ secrets.HF_USERNAME }}/copsight-ai-service
          hf_token: ${{ secrets.HF_TOKEN }}
          subdirectory: 'ai-service'
          space_sdk: 'docker'
