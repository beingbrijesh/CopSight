services:
  # Database Services
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: copsight-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"
      - "9301:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - copsight-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: copsight-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - copsight-network

  postgresql:
    image: postgres:15
    container_name: copsight-postgres
    environment:
      POSTGRES_DB: copsight_db
      POSTGRES_USER: copsight_user
      POSTGRES_PASSWORD: copsight_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend-node/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - copsight-network

  neo4j:
    image: neo4j:5.13
    container_name: copsight-neo4j
    environment:
      NEO4J_AUTH: neo4j/copsight_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - copsight-network

  redis:
    image: redis:7-alpine
    container_name: copsight-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - copsight-network
  chroma:
    image: chromadb/chroma
    container_name: copsight-chroma
    ports:
      - "8006:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - copsight-network  


volumes:
  elasticsearch_data:
  postgres_data:
  neo4j_data:
  redis_data:
  chroma_data:

networks:
  copsight-network:
    driver: bridge
