services:
  # Database Services
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ufdr-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ufdr-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: ufdr-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - ufdr-network

  postgresql:
    image: postgres:15
    container_name: ufdr-postgres
    environment:
      POSTGRES_DB: ufdr_db
      POSTGRES_USER: ufdr_user
      POSTGRES_PASSWORD: ufdr_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ufdr-network

  neo4j:
    image: neo4j:5.13
    container_name: ufdr-neo4j
    environment:
      NEO4J_AUTH: neo4j/ufdr_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - ufdr-network

  milvus:
    image: milvusdb/milvus:latest
    container_name: ufdr-milvus
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - ufdr-network

  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.10
    container_name: ufdr-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=10000
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd_data:/etcd-data
    command: /usr/local/bin/etcd --advertise-client-urls=http://0.0.0.0:2379 --listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd-data
    networks:
      - ufdr-network

  minio:
    image: minio/minio:latest
    container_name: ufdr-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - ufdr-network

  redis:
    image: redis:7-alpine
    container_name: ufdr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ufdr-network


volumes:
  elasticsearch_data:
  postgres_data:
  neo4j_data:
  milvus_data:
  etcd_data:
  minio_data:
  redis_data:

networks:
  ufdr-network:
    driver: bridge
