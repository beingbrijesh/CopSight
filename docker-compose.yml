services:
  # Database Services
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ufdr-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ufdr-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: ufdr-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - ufdr-network

  postgresql:
    image: postgres:15
    container_name: ufdr-postgres
    environment:
      POSTGRES_DB: ufdr_db
      POSTGRES_USER: ufdr_user
      POSTGRES_PASSWORD: ufdr_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ufdr-network

  neo4j:
    image: neo4j:5.13
    container_name: ufdr-neo4j
    environment:
      NEO4J_AUTH: neo4j/ufdr_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - ufdr-network

  redis:
    image: redis:7-alpine
    container_name: ufdr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ufdr-network


volumes:
  elasticsearch_data:
  postgres_data:
  neo4j_data:
  redis_data:

networks:
  ufdr-network:
    driver: bridge
