services:
  # Database Services
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ufdr-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ufdr-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: ufdr-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - ufdr-network

  postgresql:
    image: postgres:15
    container_name: ufdr-postgres
    environment:
      POSTGRES_DB: ufdr_db
      POSTGRES_USER: ufdr_user
      POSTGRES_PASSWORD: ufdr_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend-node/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ufdr-network

  neo4j:
    image: neo4j:5.13
    container_name: ufdr-neo4j
    environment:
      NEO4J_AUTH: neo4j/ufdr_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - ufdr-network

  redis:
    image: redis:7-alpine
    container_name: ufdr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ufdr-network
  chroma:
    image: chromadb/chroma
    container_name: ufdr-chroma
    ports:
      - "8006:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - ufdr-network

  # Core Backend Services
  backend:
    build: 
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: ufdr-backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgresql
      - DB_PORT=5432
      - ES_HOST=http://elasticsearch:9200
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_HOST=redis
    depends_on:
      - postgresql
      - elasticsearch
      - neo4j
      - redis
    networks:
      - ufdr-network

  worker:
    build: 
      context: ./backend-node
      dockerfile: Dockerfile
    command: node src/workers/pipelineWorker.js
    container_name: ufdr-pipeline-worker
    environment:
      - REDIS_HOST=redis
      - ES_HOST=http://elasticsearch:9200
      - DB_HOST=postgresql
    depends_on:
      - redis
      - elasticsearch
    networks:
      - ufdr-network


volumes:
  elasticsearch_data:
  postgres_data:
  neo4j_data:
  redis_data:
  chroma_data:

networks:
  ufdr-network:
    driver: bridge
